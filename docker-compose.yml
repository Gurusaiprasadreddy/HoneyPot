version: "3.9"

services:

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9095:9090"
    networks:
      - honeypot-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3003:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    networks:
      - honeypot-net
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    ports:
      - "8089:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - honeypot-net
    restart: unless-stopped

  ganache:
    image: trufflesuite/ganache:latest
    ports:
      - "7545:7545"
    command: >
      --chain.chainId 1337
      --wallet.totalAccounts 5
      --wallet.defaultBalance 1000
      --server.port 7545
    networks:
      - honeypot-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - honeypot-net

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: honeypot
      POSTGRES_PASSWORD: fakesecret123
      POSTGRES_DB: corporate_db
    ports:
      - "5434:5432"
    volumes:
      - ./honeypots/database/fake_data.sql:/docker-entrypoint-initdb.d/fake_data.sql
    networks:
      - honeypot-net

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - REDIS_HOST=redis
      - GANACHE_URL=http://ganache:7545
    depends_on:
      - redis
      - ganache
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - honeypot-net

  shadow-shell:
    build:
      context: ./honeypots/ssh
      dockerfile: Dockerfile
    ports:
      - "2223:2223"
    environment:
      - REDIS_HOST=redis
      - BACKEND_URL=http://backend:3001
      - OLLAMA_HOST=host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - shadow-shell-keys:/app/keys
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    depends_on:
      - redis
      - backend
    networks:
      - honeypot-net

  oracle-ai:
    build:
      context: ./honeypots/api
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOST=redis
      - BACKEND_URL=http://backend:3001
      - OLLAMA_HOST=host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    networks:
      - honeypot-net

  ledger-trap:
    build:
      context: ./honeypots/ethereum
      dockerfile: Dockerfile
    environment:
      - BACKEND_URL=http://backend:3001
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    depends_on:
      - backend
    networks:
      - honeypot-net

  vault-sql:
    build:
      context: ./honeypots/database
      dockerfile: Dockerfile
    environment:
      - BACKEND_URL=http://backend:3001
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    depends_on:
      - backend
    networks:
      - honeypot-net

  forge-ci:
    build:
      context: ./honeypots/cicd
      dockerfile: Dockerfile
    ports:
      - "9091:9091"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    networks:
      - honeypot-net

  dashboard:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend
    networks:
      - honeypot-net

  web-honeypot:
    build:
      context: ./honeypots/web
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      - BACKEND_URL=http://backend:3001
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    depends_on:
      - backend
    networks:
      - honeypot-net

  proxy:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    ports:
      - "2222:2222"
      - "8080:8080"
      - "3306:3306"
      - "80:80"
      - "9090:9090"
      - "8545:8545"
    environment:
      - BACKEND_URL=http://backend:3001
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      - shadow-shell
      - oracle-ai
      - web-honeypot
      - ledger-trap
      - backend
    networks:
      - honeypot-net

volumes:
  redis-data:
  shadow-shell-keys:

networks:
  honeypot-net:
    driver: bridge